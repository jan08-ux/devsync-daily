name: 23f3003756@ds.study.iitm.ac.in - Daily Scheduled Commit

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  daily-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: 23f3003756@ds.study.iitm.ac.in - Generate daily update
        run: |
          echo "Last updated on $(date)" > daily-update.txt

      - name: Commit changes
        run: |
          git config --global user.name "DevSync Bot"
          git config --global user.email "23f3003756@ds.study.iitm.ac.in"
          git add daily-update.txt
          git commit -m "Automated daily update"
          git push
